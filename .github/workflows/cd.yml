# Goal: To deploy the built images from CI Steps once the CI Worklow is Succeeded

name: CD

on: 
    workflow_call:

jobs:
    deploy:
        runs-on: ubuntu-latest
        permissions:
            issues: write
            contents: read
        steps:
            - name: Code Checkout
              uses: actions/checkout@v7

            - name: Deploy to EC2 via SSH
              uses: appleboy/ssh-action@v1.0.3
              with:
                host: ${{ secrets.EC2_HOST }}
                username: ${{ secrets.EC2_USERNAME }}
                key: ${{ secrets.EC2_SSH_KEY }}
                script: |
                  cd ${{ secrets.EC2_TARGET_DIR || '/home/ubuntu/devboard' }}
                  if [ ! -f .env ]; then
                    cp .env.example .env
                  fi
                  export DOCKERHUB_USERNAME="${{ vars.DOCKERHUB_USERNAME }}"
                  docker compose pull
                  docker compose up -d

            - name: Wait for services to be healthy
              run: |
                timeout 60s sh -c 'until curl -s http://${{ secrets.EC2_HOST }}:8080 > /dev/null; do sleep 2; done'

            - name: OWASP ZAP Baseline Scan
              uses: zaproxy/action-baseline@v0.14.0
              with:
                token: ${{ secrets.GITHUB_TOKEN }}
                target: 'http://${{ secrets.EC2_HOST }}:8080'
                fail_action: false
