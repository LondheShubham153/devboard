# goal build the image for devboard frontened and push to dockerhub after check linting the code
name: CI

on:
  push:
    branches: [master]
jobs:
  code-lint:
    runs-on: ubuntu-latest
    steps:
      - name: checkout the code
        uses: actions/checkout@v7
      - name: Set up Node.js
        uses: actions/setup-node@v1
        with:
          node-version: 12

       # Step 2: Initialize Node.js and cache global npm modules for speed
      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Specify your preferred Node version
          cache: 'npm'

      # Step 3: Install all dependencies listed in package.json
      - name: Install Dependencies
        run: npm ci

      # Step 4: Execute the linting script defined in your package.json
      - name: Execute Linter
        run: npm run lint

        
        
  build-and-push:
    needs: [code-lint]
    runs-on: ubuntu-latest
    steps:
    # code clone
      - name: Checkout repository
        uses: actions/checkout@v7

      #docker setup
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{secrets.DOCKERHUB_USERNAME}}
          password: ${{secrets.DOCKERHUB_TOKEN}}
      - name: Build and Push
        uses: docker/build-push-action@v7
        with:
  
          push: true
          tags: ${{ vars.DOCKERHUB_USERNAME }}/Devboard-fe-master:latest

      
