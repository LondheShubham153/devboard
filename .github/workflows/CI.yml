# Goal:  I have to lint, Build  test the code for Frontend & Backend.
# Then push the images to DockerHub  
  
name: CI

on:
  push:
    branches: [ main ]


jobs:
    frontend:
        # runs on git hub runner 
        runs-on: ubuntu-latest

        steps:
            - name: checkout code       #(lint)
              uses: actions/checkout@v7

            - name:  setup Nodejs #(linter frontend for nodejs  )
              uses: actions/setup-node@v6
              with:
                node-version: '20'
                cache: 'npm'
                cache-dependency-path: frontend\package-lock.json




            - name: install dependencies  # install npm packages 
              run: npm install
            
            - name: run linter
              run: npm run lint
              
            - name: run tests
              run: npm run test

