
name: Go Linter

on:
  workflow_dispatch:

jobs:
  runs-on: ubuntu-latest
  strategy:
    fail-fast: false
    matrix:
      go: ['1.23','1.22']
  steps:
    - name: Setup Go
      uses: actions/checkout@v6
      with:
        go-version: ${{ matrix.go }}   
        go-version-file: 'go.mod'
        cache-dependency-path: go.sum

    - name: Run go Formatter
      run: go fmt
      working-directory: backend

    - name: Run go vet
      run: go vet
      working-directory: backend  