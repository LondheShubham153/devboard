# Goal -- I have to Lint, Built, Ttest the code for Frontend & Backend
# Then push the images to DockerHub

name: CI

on:
  push:
    branches: [advanced]

jobs:
  frontend:
    # github runner
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v7

      - name: setup node.js
        uses: actions/checkout@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: install npm packages
        run: npm install
        working-directory: frontend

      # from package.json (scripts)
      - name: run linter
        run: npm run lint
        working-directory: frontend

      # from package.json (scripts)
      - name: run tests
        run: npm run tests
        working-directory: frontend

      - name: docker setup (login)
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ vars.DOCKERHUB_TOKEN }}

      - name: docker build and push
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          push: true
          tags: :${{ vars.DOCKERHUB_USERNAME }}/devboard-frontend-advanced:latest


  backend:
    runs-on: ubuntu-latest
    steps:
      # github runner
      - name: checkout code
        uses: actions/checkout@v7

      - name: setup golang
        uses: actions/setup-go@v6
        with:
          go-version: '1.23'
          go-version-file: 'go.mod'
          cache-dependency-path: go.sum

      - name: run go formatter
        run: go fmt
        working-directory: backend

      - name: run go vet
        run: go vet
        working-directory: backend

      - name: run tests
        run: go test
        working-directory: backend

      - name: docker setup (login)
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ vars.DOCKERHUB_TOKEN }}

      - name: docker build and push
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: true
          tags: :${{ vars.DOCKERHUB_USERNAME }}/devboard-backend-advanced:latest
