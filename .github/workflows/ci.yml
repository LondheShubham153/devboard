# Goal - I have to lint, build, test, and push images to dockerhub

name: CI
on:
  push:
    branches: [advanced]
jobs:
  frontend:
    runs-on: ubuntu-latest    
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install npm  Packages
        run: npm ci
        working-directory: frontend
      - name: Run Linter
        run: npm run lint
        working-directory: frontend
      - name: Run Tests
        run: npm run test
        working-directory: frontend
