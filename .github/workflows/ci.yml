#Goal- I have a  build, push,   devboard frontend and backend for code, then push the images to Docker Hub
name: CI

on:
    push:
        branches: [advanced]

jobs:
    code-lint:
        runs-on: ubuntu-latest
        steps:
            - name: code checkout
              uses: actions/checkout@v4
            - name: setup nodejs
              uses: actions/setup-node@v4
              with:
                node-version: '20'
                cache: npm
                cache-dependency-path: frontend/package-lock.json
            - name: Install npm packages
              run: npm ci
              working-directory: frontend
            
            - name: run linter
              run: npm run lint
              working-directory: frontend
            

