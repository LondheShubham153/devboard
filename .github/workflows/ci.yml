name: CI
on:
  push:
    branches: [advanced]
jobs:
    frontend:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v7
            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                node-version: '20'
                cache: npm  
                cache-dependency-path: frontend/package-lock.json 
                

            - name: Install packages using npm
              run: npm install
              working-directory: frontend
            - name: Run Linter
              run: npm run lint
              working-directory: frontend
            - name: Run Tests
              run: npm test
              working-directory: frontend
            - name: "Docker setup"
              uses: docker/login-action@v3
              with:
                    username: ${{ secrets.DOCKERHUB_USERNAME }}
                    password: ${{ secrets.DOCKER_TOKEN }}
            - name: "Docker Build"
              uses: docker/build-push-action@v7
              with:
                context: devboard\frontend\Dockerfile
                push: true
                tags: ${{ secrets.DOCKERHUB_USERNAME }}/devboard-frontend-master:latest
             
    
