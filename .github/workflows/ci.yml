#goal i want to lint, build and test the code for frontend & backend 
# then push the images to DockerHub


name: CI

on:
  push:
    branches: [advanced]

jobs: 
    frontend:
      runs-on: ubuntu-latest
      steps:        
        - name: Checkout code
          uses: actions/checkout@v7
          # downloads the code from Github repo into the runner machine

        - name: Setup Node Js 
          uses: actions/setup-node@v6
          with:
            node-version: '20'
            cache: npm #dependency caching for faster builds
            cache-dependency-path: frontend/package-lock.json
      
        - name: Install npm packages
          run: npm install
          working-directory: frontend

        - name: Run Linter
          run: npm run lint
          working-directory: frontend

        - name: Run Tests
          run: npm run test
          working-directory: frontend
        
