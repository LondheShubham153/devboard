# Goal - I have to Lint, Build, Test the code for Frontend & Backend
# then Push the images to DockerHub 
name: CI

on: 
    push:
        branches: [ master ]

jobs:
    frontend:
        # Github runner
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v7

            - name: Setup NodeJs
              uses: actions/setup-node@v6
              with:
                node-version: '20'
                cache: npm
                cache-dependency-path: frontend/package-lock.json
            
            - name: Install npm Packages
              run: npm install
              working-directory: frontend

            - name: Run Linter
              run: npm run lint
              working-directory: frontend

            - name: Run Tests
              run: npm run test 
              working-directory: frontend
            
            - name: Docker Setup [Login]
              uses: docker/login-action@v4
              with:
                username: ${{ vars.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Docker Build (Local Load)
              uses: docker/build-push-action@v7
              with:
                context: ./frontend
                load: true
                tags: ${{ vars.DOCKERHUB_USERNAME }}/devboard-frontend:latest

            - name: Run Trivy vulnerability scanner
              uses: aquasecurity/trivy-action@v0.36.0
              with:
                image-ref: '${{ vars.DOCKERHUB_USERNAME }}/devboard-frontend:latest'
                format: 'table'
                exit-code: '1'
                ignore-unfixed: true
                vuln-type: 'os,library'
                severity: 'CRITICAL'

            - name: Docker Push
              run: docker push ${{ vars.DOCKERHUB_USERNAME }}/devboard-frontend:latest
                
    backend:
        # Github runner
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v7

            - name: Setup Go
              uses: actions/setup-go@v6
              with:
                go-version: '1.23'
                go-version-file: 'go.mod'
                cache-dependency-path: go.sum
            
            - name: Run Go Formatter
              run: go fmt
              working-directory: backend

            - name: Run Go Vet
              run: go vet
              working-directory: backend
            
            - name: Run Tests
              run: go test 
              working-directory: backend
            
            - name: Docker Setup [Login]
              uses: docker/login-action@v4
              with:
                username: ${{ vars.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Docker Build (Local Load)
              uses: docker/build-push-action@v7
              with:
                context: ./backend
                load: true
                tags: ${{ vars.DOCKERHUB_USERNAME }}/devboard-backend:latest

            - name: Run Trivy vulnerability scanner
              uses: aquasecurity/trivy-action@v0.36.0
              with:
                image-ref: '${{ vars.DOCKERHUB_USERNAME }}/devboard-backend:latest'
                format: 'table'
                exit-code: '1'
                ignore-unfixed: true
                vuln-type: 'os,library'
                severity: 'CRITICAL'

            - name: Docker Push
              run: docker push ${{ vars.DOCKERHUB_USERNAME }}/devboard-backend:latest

    sonarqube:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v7
              with:
                fetch-depth: 0

            - name: SonarQube Scan
              uses: sonarsource/sonarqube-scan-action@v6
              continue-on-error: true
              env:
                SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
                SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

    deploy:
        needs: [frontend, backend]
        uses: ./.github/workflows/cd.yml
        secrets: inherit

